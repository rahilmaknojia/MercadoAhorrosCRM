apiVersion: v1
kind: ConfigMap
metadata:
  name: mercado-crm-config
  namespace: default
data:
  NODE_ENV: "production"
  # Next.js standalone server reads these.
  PORT: "8102"
  HOSTNAME: "0.0.0.0"
  # NEXT_PUBLIC_* are ALSO inlined into the browser bundle at image build time
  # (see Dockerfile --build-arg). Keep these values in sync with the build args;
  # the value here is what the server reads at runtime (getSession / getJwt).
  NEXT_PUBLIC_AUTH_SERVICE_URL: "https://auth.dev.mercadoahorros.net"
  NEXT_PUBLIC_AUTH_BASE_PATH: "/api/auth"
  # Server-only. The BFF proxies every API call from the server and attaches the
  # Bearer JWT; the browser never calls the API directly. In-cluster Service DNS.
  API_BASE_URL: "http://svc-mercadoapi.default.svc.cluster.local:8080"
  # Public CRM origin — used to build report links in "Send now" emails.
  NEXT_PUBLIC_CRM_URL: "https://crm.dev.mercadoahorros.net"
  # AWS SES for report email ("Send now"/scheduled). Same decoupling as the auth
  # service: SES uses dedicated SES_ACCESS_KEY_ID/SES_SECRET_ACCESS_KEY (in the Secret)
  # + SES_REGION here, NOT the generic AWS_* keys (which DigitalOcean Spaces uses).
  # Email no-ops if SES_FROM_EMAIL is empty, so this is optional.
  SES_REGION: "us-east-1"
  SES_FROM_EMAIL: ""
  SES_FROM_NAME: "Mercado Ahorros"
