apiVersion: v1
kind: Secret
metadata:
  name: mercado-crm-secret
  namespace: default
type: Opaque
# The CRM is a stateless BFF: it holds no database credentials or OAuth client
# secrets (authentication is handled by the auth service via the session cookie and
# a server-minted JWT). The only server-only secrets are the dedicated SES credentials
# used by report email ("Send now"/scheduled). These are SES-specific and kept
# separate from the generic AWS_* keys that DigitalOcean Spaces uses. Optional — leave
# unset and report email simply no-ops.
stringData:
  SES_ACCESS_KEY_ID: "your-ses-access-key-id"
  SES_SECRET_ACCESS_KEY: "your-ses-secret-access-key"
