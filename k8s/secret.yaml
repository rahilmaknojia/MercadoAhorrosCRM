apiVersion: v1
kind: Secret
metadata:
  name: mercado-crm-secret
  namespace: default
type: Opaque
# The CRM is a stateless BFF: it holds no database credentials or OAuth client
# secrets (authentication is handled by the auth service via the session cookie and
# a server-minted JWT). This Secret is reserved for any future server-only secrets
# and is referenced optionally by the Deployment, so it is safe to leave empty.
stringData: {}
